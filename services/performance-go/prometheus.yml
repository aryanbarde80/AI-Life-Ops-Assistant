global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ai-core-python'
    static_configs:
      - targets: ['ai_python:10000']

  - job_name: 'performance-go'
    static_configs:
      - targets: ['performance_go:8002']

  - job_name: 'gateway-ultimate'
    static_configs:
      - targets: ['gateway_ultimate:3000']

  - job_name: 'rust-analytics'
    static_configs:
      - targets: ['analytics_rust:8004']
