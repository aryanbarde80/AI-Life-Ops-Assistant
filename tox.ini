[tox]
envlist = py310, py311, lint, type
isolated_build = True

[testenv]
deps =
    pytest>=7.0
    pytest-asyncio
    pytest-cov
commands =
    pytest --cov=services/ai-python --cov=services/ml-python tests/

[testenv:lint]
deps = flake8
commands = flake8 services/

[testenv:type]
deps = mypy
commands = mypy services/ai-python/ services/ml-python/

[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .tox,*.egg,build,data
