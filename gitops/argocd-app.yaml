apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-life-ops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/aryanbarde80/AI-Life-Ops-Assistant.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
