version: "3.9"

services:
  # 🌐 GATEWAY & FRONTENDS
  gateway_ultimate:
    build: ./services/gateway-ultimate
    container_name: acos_gateway
    ports: ["4000:4000", "3000:3000"]
    depends_on: [redis, kafka, postgres, mongo]

  frontend_main:
    build: ./frontend
    container_name: acos_flutter

  # 🧠 AI & ML (PYTHON)
  ai_core_python:
    build: ./services/ai-python
    container_name: acos_ai
    depends_on: [redis, faiss]

  ml_engine_python:
    build: ./services/ml-python
    container_name: acos_ml

  # ✍️ BLOG & CONTENT (NODE/NEXT)
  blog_engine:
    build: ./services/blog-engine-node
    container_name: acos_blog

  # ⚙️ WORKFLOW & PERFORMANCE (PYTHON/GO)
  workflow_engine:
    build: ./services/workflow-engine-python
    container_name: acos_workflow

  performance_go:
    build: ./services/performance-go
    container_name: acos_go

  # 🔔 NOTIFICATIONS & ANALYTICS (JAVA/RUST)
  notification_java:
    build: ./services/notification-java
    container_name: acos_java

  analytics_rust:
    build: ./services/analytics-rust
    container_name: acos_rust

  # 💀 10+ DATABASE ARMAGEDDON
  postgres:
    image: postgres:15-alpine
    container_name: acos_postgres
    environment: [POSTGRES_PASSWORD=admin]

  mongo:
    image: mongo:latest
    container_name: acos_mongo

  redis:
    image: redis:alpine
    container_name: acos_redis

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: acos_elastic
    environment: [ "discovery.type=single-node", "xpack.security.enabled=false" ]

  influxdb:
    image: influxdb:latest
    container_name: acos_influx

  neo4j:
    image: neo4j:latest
    container_name: acos_neo4j
    environment: [NEO4J_AUTH=none]

  faiss:
    image: bitnami/faiss:latest
    container_name: acos_faiss

  minio:
    image: minio/minio:latest
    container_name: acos_minio
    command: server /data

  cassandra:
    image: cassandra:latest
    container_name: acos_cassandra

  kafka:
    image: bitnami/kafka:latest
    container_name: acos_kafka
    environment: [ALLOW_PLAINTEXT_LISTENER=yes]
    depends_on: [zookeeper]

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: acos_zookeeper
