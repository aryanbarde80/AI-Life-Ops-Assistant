services:
  # ─────────────────────────────────────────────
  #  Unified Service (Frontend + Backend)
  # ─────────────────────────────────────────────
  - type: web
    name: ai-life-ops-assistant
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_CONFIG
        sync: false
    autoDeploy: true
