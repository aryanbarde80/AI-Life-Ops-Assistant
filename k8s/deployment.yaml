apiVersion: apps/v1
kind: Deployment
metadata:
  name: acos-gateway-deployment
  labels:
    app: acos-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: acos-gateway
  template:
    metadata:
      labels:
        app: acos-gateway
    spec:
      containers:
      - name: acos-gateway
        image: acos/gateway:latest
        ports:
        - containerPort: 3000
        - containerPort: 4000
        env:
        - name: AI_SERVICE_URL
          value: "http://acos-ai-service:10000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acos-ai-core
spec:
  replicas: 5
  selector:
    matchLabels:
      app: acos-ai
  template:
    metadata:
      labels:
        app: acos-ai
    spec:
      containers:
      - name: acos-ai
        image: acos/ai-core:latest
        ports:
        - containerPort: 10000
